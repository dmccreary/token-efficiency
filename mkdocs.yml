theme:
  name: material
  logo: img/mascot/neutral.png
  favicon: img/favicon.ico
  palette:
    - scheme: default
      primary: deep orange
      accent: blue grey
  include_sidebar: true
  # NOTE: per project CLAUDE.md, do NOT add navigation.tabs — these books use
  # side navigation optimized for wide landscape screens.
  features:
    - content.code.copy        # one-click copy on every code block
    - content.action.edit      # "edit this page" link via repo_url + edit_uri
    - navigation.expand        # expand the active section in the sidebar
    - navigation.path          # breadcrumbs
    - navigation.prune         # only render visible nav (faster on big sites)
    - navigation.indexes       # section landing pages from index.md
    - navigation.top           # back-to-top button on long pages
    - navigation.footer        # prev/next links in the page footer
    - toc.follow               # right-side TOC tracks scroll position

extra_css:
  - css/mascot.css
  - css/extra.css

markdown_extensions:
  - admonition
  - md_in_html
  - attr_list
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - js/extra.js

plugins:
  - search

  # Auto-generates Open Graph / Twitter social-preview images from each page's
  # title and description. Requires: pip install "mkdocs-material[imaging]"
  - social

  # Click-to-zoom for any image. Requires: pip install mkdocs-glightbox
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom

# Hooks — loaded as raw Python modules, not plugins (avoids name collisions).
# `plugins/social_override.py` rewrites the og:image / twitter:image tags
# emitted by the `social` plugin above so that pages with an `image:`
# frontmatter field use the declared cover image instead of the
# auto-generated social card under /assets/images/social/.
hooks:
  - plugins/social_override.py

# Native MkDocs (1.5+) file-exclusion using gitignore-style patterns.
# Replaces the third-party mkdocs-exclude plugin — no extra install needed.
# Excluded files do not appear in the build, search index, sitemap, or nav.
exclude_docs: |
  image-prompt*.md
  /**/image-prompt*.md
  cover-prompt.md
  /**/cover-prompt.md
  TODO.md
  /**/TODO.md

# Rebuild on changes to docs/ and the config itself when running `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2026 Dan McCreary. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # Optional: Google Analytics. Uncomment and set property to your G-XXXXXXXX ID.
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXX

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Token Efficiency
  textbook_version: "1.0"

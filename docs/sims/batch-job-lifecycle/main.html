<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Batch Job Lifecycle</title>
<link rel="stylesheet" href="style.css">
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
window.mermaid = mermaid;
mermaid.initialize({startOnLoad:false,theme:'default',flowchart:{useMaxWidth:true,htmlLabels:true,curve:'basis'}});
</script>
</head>
<body>
<main>
<div class="toolbar">
<span class="toolbar-title">Batch Job Lifecycle</span>
<label class="toggle"><input type="checkbox" id="pollingToggle"> Use polling instead of webhook</label>
</div>
<div class="container">
<div class="diagram-panel"><div id="mermaidContainer" class="mermaid"></div></div>
<aside class="info-panel">
<div class="legend">
<div class="legend-title">Color Key</div>
<div class="legend-item"><span class="dot" style="background:#0277bd"></span>In-flight</div>
<div class="legend-item"><span class="dot" style="background:#2e7d32"></span>Success terminal</div>
<div class="legend-item"><span class="dot" style="background:#f9a825"></span>Partial / retry-able</div>
<div class="legend-item"><span class="dot" style="background:#c62828"></span>Terminal failure</div>
</div>
<h3>State Details</h3>
<div id="panelWrap"><div id="panel"><div class="info-placeholder">Hover any state to see expected duration and what to do next.</div></div></div>
</aside>
</div>
</main>
<script src="batch-job-lifecycle.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>LLM Logging Pipeline with Privacy Filters</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        window.mermaid = mermaid;
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
        });
    </script>
</head>
<body>
<main>
<div class="toolbar">
    <span class="toolbar-title">LLM Logging Pipeline with Privacy Filters</span>
    <label class="toggle">
        <input type="checkbox" id="piiToggle">
        <span>PII detected in prompt</span>
    </label>
    <label class="slider-label">
        Truncate prompt at <span id="truncVal">800</span> tokens
        <input type="range" id="truncSlider" min="100" max="2000" step="50" value="800">
    </label>
</div>

<div class="container">
    <div class="diagram-panel">
        <div id="mermaidContainer" class="mermaid"></div>
    </div>
    <aside class="info-panel">
        <div class="legend">
            <div class="legend-title">Stage Color Key</div>
            <div class="legend-item"><span class="dot" style="background:#0277bd"></span>Application</div>
            <div class="legend-item"><span class="dot" style="background:#7b1fa2"></span>LLM API</div>
            <div class="legend-item"><span class="dot" style="background:#c1440e"></span>Privacy filter</div>
            <div class="legend-item"><span class="dot" style="background:#2e7d32"></span>Logging / storage</div>
            <div class="legend-item"><span class="dot" style="background:#a16207"></span>Retention</div>
        </div>
        <h3>Sample Log Output</h3>
        <pre id="logOutput" class="log-output"></pre>
        <div class="hint">Toggle PII detection or move the truncation slider to see how the emitted JSONL line changes.</div>
    </aside>
</div>

</main>
<script src="llm-logging-pipeline-privacy.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Cost Optimization Loop</title>
<link rel="stylesheet" href="style.css">
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
window.mermaid = mermaid;
mermaid.initialize({startOnLoad:false,theme:'default',flowchart:{useMaxWidth:true,htmlLabels:true,curve:'basis'}});
</script>
</head>
<body>
<main>
<div class="toolbar">
<span class="toolbar-title">Cost Optimization Loop</span>
<label class="toggle"><input type="checkbox" id="failureToggle"> Show failure paths</label>
</div>
<div class="container">
<div class="diagram-panel"><div id="mermaidContainer" class="mermaid"></div></div>
<aside class="info-panel">
<div class="legend">
<div class="legend-title">Color Key</div>
<div class="legend-item"><span class="dot" style="background:#0277bd"></span>Measure</div>
<div class="legend-item"><span class="dot" style="background:#7b1fa2"></span>Hypothesize</div>
<div class="legend-item"><span class="dot" style="background:#c1440e"></span>Test &amp; pilot</div>
<div class="legend-item"><span class="dot" style="background:#2e7d32"></span>Roll out</div>
<div class="legend-item"><span class="dot" style="background:#c62828"></span>Failure path</div>
</div>
<h3>Stage Details</h3>
<div id="panelWrap"><div id="panel"><div class="info-placeholder">Hover any stage to see the artifact it produces and an example.</div></div></div>
</aside>
</div>
</main>
<script src="cost-optimization-loop.js"></script>
</body>
</html>

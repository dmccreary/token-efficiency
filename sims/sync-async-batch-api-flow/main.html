<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Sync, Async, and Batch API Flow</title>
<link rel="stylesheet" href="style.css">
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
window.mermaid = mermaid;
mermaid.initialize({startOnLoad:false,theme:'default',sequence:{useMaxWidth:true}});
</script>
</head>
<body>
<main>
<div class="toolbar">
<span class="toolbar-title">Sync vs Async vs Batch API Flow</span>
<label class="toggle"><input type="radio" name="mode" id="modeSync" checked> Sync</label>
<label class="toggle"><input type="radio" name="mode" id="modeAsync"> Async</label>
<label class="toggle"><input type="radio" name="mode" id="modeBatch"> Batch</label>
</div>
<div class="container">
<div class="diagram-panel"><div id="mermaidContainer" class="mermaid"></div></div>
<aside class="info-panel">
<div class="legend">
<div class="legend-title">Mode at a glance</div>
<div class="legend-item"><span class="dot" style="background:#0277bd"></span>Sync: 1× cost, sec latency</div>
<div class="legend-item"><span class="dot" style="background:#7b1fa2"></span>Async: 1× cost, sec-to-min latency</div>
<div class="legend-item"><span class="dot" style="background:#2e7d32"></span>Batch: 0.5× cost, hour latency</div>
</div>
<h3>When to Use</h3>
<div id="panelWrap"><div id="panel"><div class="info-placeholder">Select a mode above. Hover any step to see what it does. The mode dropdown also updates this panel with workload guidance.</div></div></div>
</aside>
</div>
</main>
<script src="sync-async-batch-api-flow.js"></script>
</body>
</html>

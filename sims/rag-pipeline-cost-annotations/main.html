<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>RAG Pipeline Cost Annotations</title>
<link rel="stylesheet" href="style.css">
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
window.mermaid = mermaid;
mermaid.initialize({startOnLoad:false,theme:'default',flowchart:{useMaxWidth:true,htmlLabels:true,curve:'basis'}});
</script>
</head>
<body>
<main>
<div class="toolbar">
<span class="toolbar-title">RAG Pipeline with Cost Annotations</span>
<div class="caps-row" style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
<label class="cap-block">K (top retrieval): <span id="kVal">20</span><input type="range" id="kSlider" min="5" max="50" step="1" value="20" style="width:120px"></label>
<label class="cap-block">N (after rerank): <span id="nVal">5</span><input type="range" id="nSlider" min="1" max="20" step="1" value="5" style="width:120px"></label>
<label class="toggle"><input type="checkbox" id="rerankerOn" checked> Reranker on</label>
<label class="toggle"><input type="checkbox" id="pruningOn" checked> Pruning on</label>
</div>
</div>
<div class="container">
<div class="diagram-panel"><div id="mermaidContainer" class="mermaid"></div></div>
<aside class="info-panel">
<div class="legend">
<div class="legend-title">Color Key</div>
<div class="legend-item"><span class="dot" style="background:#0277bd"></span>Cheap (no LLM)</div>
<div class="legend-item"><span class="dot" style="background:#7b1fa2"></span>Reranker (cheap LLM)</div>
<div class="legend-item"><span class="dot" style="background:#c1440e"></span>Main LLM (expensive)</div>
</div>
<h3>Stage Cost</h3>
<div id="panelWrap"><div id="panel"><div class="info-placeholder">Hover any stage to see cost details. Move the K and N sliders to see how injected token count changes.</div></div></div>
</aside>
</div>
</main>
<script src="rag-pipeline-cost-annotations.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Session Token Accumulation</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<main>
<div class="header"><span class="title">Session Token Accumulation</span><span class="subtitle">Stacked area: which components grow linear vs quadratic</span></div>
<div class="status" id="status">Conversation history grows quadratically with iterations because each turn re-reads all previous turns.</div>
<div class="timeline" style="height: 320px"><canvas id="chart"></canvas></div>
<div class="controls">
<div class="control-row">
<label class="control-block">System prompt: <span id="spVal">8000</span><input type="range" id="spSlider" min="5000" max="20000" step="500" value="8000" style="width:160px"></label>
<label class="control-block">Avg tool result: <span id="trVal">1000</span><input type="range" id="trSlider" min="200" max="5000" step="100" value="1000" style="width:160px"></label>
<label class="control-block">Avg output/turn: <span id="outVal">500</span><input type="range" id="outSlider" min="200" max="2000" step="100" value="500" style="width:160px"></label>
<label class="control-block">Iterations: <span id="itVal">50</span><input type="range" id="itSlider" min="5" max="100" step="1" value="50" style="width:160px"></label>
<label class="control-block"><input type="checkbox" id="cacheOn" checked> Caching on</label>
</div>
</div>
</main>
<script src="session-token-accumulation.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Privacy Compliance Pipeline</title>
<link rel="stylesheet" href="style.css">
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
window.mermaid = mermaid;
mermaid.initialize({startOnLoad:false,theme:'default',flowchart:{useMaxWidth:true,htmlLabels:true,curve:'basis'}});
</script>
</head>
<body>
<main>
<div class="toolbar">
<span class="toolbar-title">Privacy &amp; Compliance Pipeline</span>
<label class="toggle"><input type="checkbox" id="gdprToggle" checked> GDPR</label>
<label class="toggle"><input type="checkbox" id="hipaaToggle" checked> HIPAA</label>
<label class="toggle"><input type="checkbox" id="soc2Toggle" checked> SOC2</label>
</div>
<div class="container">
<div class="diagram-panel"><div id="mermaidContainer" class="mermaid"></div></div>
<aside class="info-panel">
<div class="legend">
<div class="legend-title">Color Key</div>
<div class="legend-item"><span class="dot" style="background:#0277bd"></span>Input/output</div>
<div class="legend-item"><span class="dot" style="background:#7b1fa2"></span>Redaction/tokenization</div>
<div class="legend-item"><span class="dot" style="background:#c1440e"></span>Routing/LLM call</div>
<div class="legend-item"><span class="dot" style="background:#2e7d32"></span>Audit emission</div>
</div>
<h3>Step Details</h3>
<div id="panelWrap"><div id="panel"><div class="info-placeholder">Hover any step. Toggle frameworks to see required controls.</div></div></div>
</aside>
</div>
</main>
<script src="privacy-compliance-pipeline.js"></script>
</body>
</html>
